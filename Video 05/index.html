<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="image.png" alt="MSD 2011 WorldCup Winning Six" height="500">
    <br>

    <table>
        <caption>Employee Details</caption>

        <thead>
            Header
            <tr>
                <th>Name</th>
                <th>Designation</th>
                <th>Fav Language</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Lakshay</td>
                <td>Programmer</td>
                <td>Python</td>
            </tr>
            
            <tr>
                <td>Rohan</td>
                <td>Programmer</td>
                <td rowspan="2">JavaScript</td>
            </tr>

            <tr>
                <td>Mohan</td>
                <td>Programmer</td>
            </tr>
            
        </tbody>
        
        <tfoot>
            <tr>
                <td colspan="3">Foot</td>
            </tr>
            Footer
        </tfoot>
    </table>

    <ul type="square">
        <li>Lakshay</li>
        <li>Rohan</li>
        <li>Mohan</li>
    </ul>

    <ol type="A">
        <li>Lakshay</li>
        <li>Rohan</li>
        <li>Mohan</li>
    </ol>

    <dl>
        <dt>HTML</dt>
        <dd>Hyper Text Markup Language</dd>

        <dt>CSS</dt>
        <dd>Cascading Style Sheet</dd>

        <dt>JS</dt>
        <dd>JavaScript</dd>
    </dl>
</body>
</html>
