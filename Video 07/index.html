<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Lets learn it</title>
</head>
<body>
    <h1>Form to apply for Sigma Web Dev - TA</h1>
    <form action="" method="post">
        <div>
            <label for="username">Enter Username</label>
            <input type="text" name="username" id="username" placeholder="Enter Your Username" autofocus>
        </div>

        <div>
            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>

            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>
        </div>

        <div>
            <input type="checkbox" name="subscribe" id="subscribe" value="yes">
            <label for="subscribe">Subscribe to newsletter</label>
        </div>

        <div>
            <label for="address">Enter Address</label>
            <br>
            <textarea name="address" id="addrees" rows="4" cols="50"></textarea>
        </div>

        <div>
            <select name="fruit" id="fruit">
                <option value="mango">Mango</option>
                <option value="pineapple">Pineapple</option>
                <option value="grapes">Grapes</option>
            </select>
        </div>
    </form>
</body>
</html>
