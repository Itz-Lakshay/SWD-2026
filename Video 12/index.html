<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This Website is about HTML Media Player comprising some of the most Vibrant Content">
    <title>HTML Media Player - LakshayTheCoder</title>
</head>
<body>
    <!-- Excercise 1 - Pure HTML Media Player
    You are given 12 file - 6 audio and 6 video
    Design a website using HTML only which shows these 12 files
    1.mp3,2.mp3 ... 6.mp3
    1.mp4,2.mp4 ... 6.mp4 -->

    <header>
        <nav>
            <ul>
                <li>Home</li>
                <li>Contact</li>
                <li>About Us</li>
            </ul>
        </nav>
        <h1>HTML Media Player</h1>
    </header>

    <main>
        <section>
            <h2>Audios-></h2>

            <h3>Audio 1.mp3</h3>
            <audio src="1.mp3" controls muted loop preload="auto"></audio>

            <h3>Audio 2.mp3</h3>
            <audio src="2.mp3" controls muted loop></audio>
            
            <h3>Audio 3.mp3</h3>
            <audio src="3.mp3" controls muted loop></audio>

            <h3>Audio 4.mp3</h3>
            <audio src="4.mp3" controls muted loop></audio>

            <h3>Audio 5.mp3</h3>
            <audio src="5.mp3" controls muted loop></audio>

            <h3>Audio 6.mp3</h3>
            <audio src="6.mp3" controls muted loop></audio>
        </section>

        <section>
            <h2>Videos-></h2>

            <h3>Video 1.mp4</h3>
            <video src="1.mp4" controls muted loop height="333" preload="auto" poster="download (2).png"></video>

            <h3>Video 2.mp4</h3>
            <video src="2.mp4" controls muted loop height="333"></video>

            <h3>Video 3.mp4</h3>
            <video src="3.mp4" controls muted loop height="333"></video>

            <h3>Video 4.mp4</h3>
            <video src="4.mp4" controls muted loop height="333"></video>

            <h3>Video 5.mp4</h3>
            <video src="5.mp4" controls muted loop height="333"></video>

            <h3>Video 6.mp4</h3>
            <video src="6.mp4" controls muted loop height="333"></video>
        </section>
    </main>

    <footer>
        <p>Copyright LTC | All Rights Reserved</p>
    </footer>
</body>
</html>
